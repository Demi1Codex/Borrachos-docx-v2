<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Borrachos.docx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="/palpueblo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>

  <!-- Login Modal -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal login-modal">
      <div class="modal-header">
        <h2 class="modal-title">🔐 Borrachos Login</h2>
      </div>
      <div class="login-content">
        <div class="login-tabs">
          <button id="loginTabBtn" class="login-tab active">Iniciar Sesión</button>
          <button id="registerTabBtn" class="login-tab">Registrarse</button>
        </div>
        
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="loginUsername">Usuario</label>
            <input type="text" id="loginUsername" class="form-control" required placeholder="Tu nombre de usuario">
          </div>
          <div class="form-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" class="form-control" required placeholder="Tu contraseña">
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Entrar</button>
        </form>

        <form id="registerForm" class="login-form" style="display: none;">
          <div class="form-group">
            <label for="registerUsername">Usuario</label>
            <input type="text" id="registerUsername" class="form-control" required placeholder="Elige un nombre de usuario">
          </div>
          <div class="form-group">
            <label for="registerPassword">Contraseña</label>
            <input type="password" id="registerPassword" class="form-control" required placeholder="Crea una contraseña">
          </div>
          <div class="form-group">
            <label for="registerPassword2">Confirmar Contraseña</label>
            <input type="password" id="registerPassword2" class="form-control" required placeholder="Repite la contraseña">
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Crear Cuenta</button>
        </form>
        
        <div id="loginError" class="login-error" style="display: none;"></div>
      </div>
    </div>
  </div>

  <!-- User Info Bar -->
  <div id="userInfoBar" class="user-info-bar" style="display: none;">
    <span id="currentUserDisplay"></span>
    <span id="syncStatus" class="sync-status">●</span>
    <button id="logoutBtn" class="btn-icon" title="Cerrar Sesión">🚪</button>
  </div>

  <header>
    <img src="/palpueblo.png" alt="Logo" class="logo">
    <h1>Borrachos.docx</h1>
    <div class="controls">
      <button id="calendarBtn" class="theme-toggle" aria-label="Ver Calendario">
        📅
      </button>
      <button id="shareBtn" class="theme-toggle" aria-label="Compartir Tablero">
        📤
      </button>
      <button id="openSharedBtn" class="theme-toggle" aria-label="Abrir Compartido">
        📂
      </button>
      <button id="colorPickerBtn" class="theme-toggle" aria-label="Cambiar Color">
        🎨
      </button>
      <input type="color" id="accentColorInput"
        style="visibility: hidden; width: 0; padding: 0; border: 0; position: absolute;">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">
        ☀️
      </button>
      <input type="file" id="sharedFileInput" accept=".lock" style="display: none;">
    </div>
  </header>

  <main class="container">

    <div class="radio-inputs" id="categoryFilterList">
      <label class="radio">
        <input type="radio" name="category" value="all" checked>
        <span class="name">
          <span class="pre-name"></span>
          <span class="pos-name"></span>
          <span>Todas</span>
        </span>
      </label>
      <label class="radio">
        <input type="radio" name="category" value="Personal">
        <span class="name">
          <span class="pre-name"></span>
          <span class="pos-name"></span>
          <span>Personal</span>
        </span>
      </label>
      <label class="radio">
        <input type="radio" name="category" value="Trabajo">
        <span class="name">
          <span class="pre-name"></span>
          <span class="pos-name"></span>
          <span>Trabajo</span>
        </span>
      </label>
      <label class="radio">
        <input type="radio" name="category" value="Diversion">
        <span class="name">
          <span class="pre-name"></span>
          <span class="pos-name"></span>
          <span>Diversión</span>
        </span>
      </label>
      <label class="radio">
        <input type="radio" name="category" value="Grupales">
        <span class="name">
          <span class="pre-name"></span>
          <span class="pos-name"></span>
          <span>Grupales</span>
        </span>
      </label>
    </div>

    <div class="content-wrapper">
      <div class="content-inner">
        <div class="content-area">
          <div class="toolbar">
            <button id="addIdeaBtn" class="btn-primary">
              + Nueva Idea
            </button>
          </div>

          <div class="board">

            <!-- Progress Column -->
            <div class="column">
              <div class="column-header">
                <span class="column-title">
                  <span style="color: #60A5FA;">●</span>
                  En Progreso
                </span>
                <span id="progressCount" class="count-badge">0</span>
              </div>
              <div id="progressList" class="idea-list">
                <!-- Ideas will be injected here -->
                <div class="empty-state">No hay ideas en progreso</div>
              </div>
            </div>

            <!-- Paused Column -->
            <div class="column">
              <div class="column-header">
                <span class="column-title">
                  <span style="color: #F87171;">●</span>
                  Pausado
                </span>
                <span id="pausedCount" class="count-badge">0</span>
              </div>
              <div id="pausedList" class="idea-list">
                <!-- Ideas will be injected here -->
                <div class="empty-state">No hay ideas pausadas</div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Create Idea Modal -->
  <div id="ideaModal" class="modal-overlay">
    <div class="modal">

      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Crear Nueva Idea</h2>
        <button id="closeModalBtn" class="btn-icon">✕</button>
      </div>

      <form id="ideaForm">

        <div class="form-group">
          <label for="ideaTitle">Nombre de la idea</label>
          <input type="text" id="ideaTitle" class="form-control" required placeholder="Ej: Rediseñar landing page...">
        </div>

        <div class="form-group">
          <label for="ideaDesc">Descripción</label>
          <textarea id="ideaDesc" class="form-control" rows="3" required
            placeholder="Detalles sobre la idea..."></textarea>
        </div>

        <div class="form-group">
          <label for="ideaCategory">Categoría</label>
          <select id="ideaCategory" class="form-control select-status">
            <option value="Personal">Personal</option>
            <option value="Trabajo">Trabajo</option>
            <option value="Diversion">Diversión</option>
            <option value="Grupales">Grupales</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ideaStatus">Estado Inicial</label>
          <select id="ideaStatus" class="form-control select-status">
            <option value="progress">En Progreso</option>
            <option value="paused">Pausado</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ideaDate">Fecha y Hora (Opcional para el Calendario)</label>
          <input type="datetime-local" id="ideaDate" class="form-control">
        </div>

        <div class="form-group">
          <label for="ideaNotify">Notificaciones</label>
          <select id="ideaNotify" class="form-control select-status">
            <option value="true" selected>🔔 Notificarme</option>
            <option value="false">🔕 No notificarme</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ideaImage">Imagen (Opcional)</label>
          <input type="file" id="ideaImage" class="form-control" accept="image/*">
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="ideaKeepShared" value="true">
            <span>Mantener al importar (idea compartida)</span>
          </label>
        </div>

        <input type="hidden" id="ideaId">
        <div class="modal-footer">
          <button type="button" id="cancelIdea" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar Idea</button>
        </div>

      </form>
    </div>
  </div>

  <!-- Calendar View Modal -->
  <div id="calendarModal" class="modal-overlay">
    <div class="modal calendar-modal">
      <div class="modal-header">
        <h2 class="modal-title">📅 Mi Calendario</h2>
        <button id="closeCalendar" class="btn-icon">✕</button>
      </div>
      <div id="calendarContent" class="calendar-content">
        <div id="calendarEvents" class="events-list">
          <div id="eventsContainer"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="requestNotifyBtn" class="btn-secondary">🔔 Activar Notificaciones de Escritorio</button>
        <button id="closeCalendarBtn" class="btn-primary">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Notification Toast Container -->
  <div id="notificationContainer" class="notification-container"></div>

  <footer
    style="text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
    <button id="setupPermsBtn" class="btn-secondary" style="font-size: 0.7rem; padding: 4px 10px; opacity: 0.7;">
      🔑 Configurar Permisos de Almacenamiento
    </button>
    <p>&copy; 2025 Borrachos.docx Application | <a href="privacy.html"
        style="color: var(--text-secondary); text-decoration: underline;">Política de Privacidad</a></p>
  </footer>

  <script src="github-client.js"></script>
  <script src="user-manager.js"></script>
  <script src="main.js"></script>
  <link rel="stylesheet" href="style.css">
</body>

</html>
